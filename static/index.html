<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>DataMind</title>
<style>
:root {
  --bg: #0f1117;
  --surface: #1a1d27;
  --surface2: #232734;
  --border: #2d3143;
  --text: #e4e4e7;
  --text2: #9ca3af;
  --accent: #6366f1;
  --accent-light: #818cf8;
  --green: #22c55e;
  --red: #ef4444;
  --orange: #f59e0b;
  --radius: 10px;
}
* { margin: 0; padding: 0; box-sizing: border-box; }
body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: var(--bg); color: var(--text); height: 100vh; display: flex; flex-direction: column; overflow: hidden; }

/* Header */
header { display: flex; align-items: center; justify-content: space-between; padding: 12px 24px; background: var(--surface); border-bottom: 1px solid var(--border); flex-shrink: 0; }
header h1 { font-size: 20px; font-weight: 700; background: linear-gradient(135deg, var(--accent), #a78bfa); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
.header-right { display: flex; gap: 8px; }
.tab-btn { padding: 6px 14px; border: 1px solid var(--border); background: var(--surface2); color: var(--text2); border-radius: 6px; cursor: pointer; font-size: 13px; transition: all .2s; }
.tab-btn:hover { border-color: var(--accent); color: var(--text); }
.tab-btn.active { background: var(--accent); color: #fff; border-color: var(--accent); }

/* Main layout */
.main { display: flex; flex: 1; overflow: hidden; }

/* Chat panel */
.chat-panel { flex: 1; display: flex; flex-direction: column; border-right: 1px solid var(--border); }
.messages { flex: 1; overflow-y: auto; padding: 20px; display: flex; flex-direction: column; gap: 16px; }
.msg { max-width: 85%; padding: 12px 16px; border-radius: var(--radius); line-height: 1.6; font-size: 14px; white-space: pre-wrap; word-break: break-word; }
.msg.user { align-self: flex-end; background: var(--accent); color: #fff; border-bottom-right-radius: 4px; }
.msg.assistant { align-self: flex-start; background: var(--surface2); border-bottom-left-radius: 4px; }
.msg.assistant.streaming { border-left: 3px solid var(--accent-light); }

.chat-input-area { padding: 16px 20px; background: var(--surface); border-top: 1px solid var(--border); display: flex; gap: 10px; }
.chat-input-area input { flex: 1; padding: 10px 16px; background: var(--surface2); border: 1px solid var(--border); border-radius: var(--radius); color: var(--text); font-size: 14px; outline: none; }
.chat-input-area input:focus { border-color: var(--accent); }
.chat-input-area button { padding: 10px 20px; background: var(--accent); color: #fff; border: none; border-radius: var(--radius); cursor: pointer; font-size: 14px; font-weight: 500; }
.chat-input-area button:hover { background: var(--accent-light); }
.chat-input-area button:disabled { opacity: .5; cursor: not-allowed; }

/* Side panel */
.side-panel { width: 420px; display: flex; flex-direction: column; overflow: hidden; background: var(--surface); flex-shrink: 0; }
.side-panel.hidden { display: none; }
.panel-content { flex: 1; overflow-y: auto; padding: 16px; }

/* Cards */
.card { background: var(--surface2); border: 1px solid var(--border); border-radius: var(--radius); padding: 16px; margin-bottom: 12px; }
.card h3 { font-size: 14px; font-weight: 600; margin-bottom: 10px; display: flex; align-items: center; gap: 8px; }
.badge { display: inline-block; padding: 2px 8px; border-radius: 12px; font-size: 11px; font-weight: 600; }
.badge.green { background: rgba(34,197,94,.15); color: var(--green); }
.badge.orange { background: rgba(245,158,11,.15); color: var(--orange); }
.badge.red { background: rgba(239,68,68,.15); color: var(--red); }

/* Table */
.data-table { width: 100%; border-collapse: collapse; font-size: 13px; }
.data-table th { text-align: left; padding: 8px 10px; background: var(--bg); color: var(--text2); font-weight: 500; border-bottom: 1px solid var(--border); position: sticky; top: 0; }
.data-table td { padding: 7px 10px; border-bottom: 1px solid var(--border); color: var(--text); }
.data-table tr:hover td { background: rgba(99,102,241,.05); }

/* Skill item */
.skill-item { padding: 10px 12px; background: var(--bg); border-radius: 8px; margin-bottom: 8px; }
.skill-name { font-weight: 600; font-size: 13px; color: var(--accent-light); }
.skill-desc { font-size: 12px; color: var(--text2); margin-top: 4px; line-height: 1.5; }

/* Memory item */
.mem-item { padding: 8px 10px; background: var(--bg); border-radius: 6px; margin-bottom: 6px; font-size: 13px; }
.mem-role { font-weight: 600; font-size: 11px; text-transform: uppercase; margin-bottom: 3px; }
.mem-role.user { color: var(--accent-light); }
.mem-role.assistant { color: var(--green); }

/* Graph nodes */
.entity-tag { display: inline-block; padding: 3px 10px; background: rgba(99,102,241,.12); color: var(--accent-light); border-radius: 14px; font-size: 12px; margin: 3px; }
.relation-item { font-size: 12px; padding: 6px 0; border-bottom: 1px solid var(--border); color: var(--text2); }
.relation-item span { color: var(--accent-light); font-weight: 500; }

/* File item */
.file-item { display: flex; justify-content: space-between; align-items: center; padding: 8px 10px; background: var(--bg); border-radius: 6px; margin-bottom: 6px; }
.file-name { font-size: 13px; }
.file-size { font-size: 11px; color: var(--text2); }
.file-del { background: none; border: none; color: var(--red); cursor: pointer; font-size: 12px; padding: 4px 8px; border-radius: 4px; }
.file-del:hover { background: rgba(239,68,68,.15); }

/* Actions */
.action-bar { display: flex; gap: 8px; margin-bottom: 12px; flex-wrap: wrap; }
.action-btn { padding: 6px 14px; background: var(--surface2); border: 1px solid var(--border); color: var(--text2); border-radius: 6px; cursor: pointer; font-size: 12px; }
.action-btn:hover { border-color: var(--accent); color: var(--text); }
.action-btn.danger { border-color: var(--red); color: var(--red); }
.action-btn.danger:hover { background: rgba(239,68,68,.1); }

/* Upload */
.upload-zone { border: 2px dashed var(--border); border-radius: var(--radius); padding: 20px; text-align: center; color: var(--text2); font-size: 13px; cursor: pointer; transition: all .2s; margin-bottom: 12px; }
.upload-zone:hover { border-color: var(--accent); color: var(--text); }
.upload-zone input { display: none; }

/* Loading */
.loading { text-align: center; padding: 20px; color: var(--text2); }
.dot-pulse { display: inline-block; width: 6px; height: 6px; background: var(--accent); border-radius: 50%; animation: pulse 1s ease-in-out infinite; }
@keyframes pulse { 0%,100% { opacity: .3; } 50% { opacity: 1; } }

/* Scrollbar */
::-webkit-scrollbar { width: 6px; }
::-webkit-scrollbar-track { background: transparent; }
::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }
::-webkit-scrollbar-thumb:hover { background: var(--text2); }
</style>
</head>
<body>

<header>
  <h1>DataMind</h1>
  <div class="header-right">
    <button class="tab-btn active" onclick="switchTab('skills')">Skills</button>
    <button class="tab-btn" onclick="switchTab('memory')">Memory</button>
    <button class="tab-btn" onclick="switchTab('rag')">RAG</button>
    <button class="tab-btn" onclick="switchTab('graphrag')">GraphRAG</button>
    <button class="tab-btn" onclick="switchTab('database')">Database</button>
  </div>
</header>

<div class="main">
  <!-- Chat -->
  <div class="chat-panel">
    <div class="messages" id="messages">
      <div class="msg assistant">你好！我是 DataMind 智能助手。我可以检索知识库、查询数据库、使用知识图谱推理，还有各种实用技能。请问有什么可以帮你的？</div>
    </div>
    <div class="chat-input-area">
      <input type="text" id="chatInput" placeholder="输入消息..." onkeydown="if(event.key==='Enter')sendMessage()">
      <button id="sendBtn" onclick="sendMessage()">发送</button>
    </div>
  </div>

  <!-- Side panels -->
  <div class="side-panel" id="sidePanel">
    <div class="panel-content" id="panelContent"></div>
  </div>
</div>

<script>
let currentTab = 'skills';

// Tab switching
function switchTab(tab) {
  currentTab = tab;
  document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
  event.target.classList.add('active');
  document.getElementById('sidePanel').classList.remove('hidden');
  loadPanel(tab);
}

// Load panel content
async function loadPanel(tab) {
  const panel = document.getElementById('panelContent');
  panel.innerHTML = '<div class="loading"><span class="dot-pulse"></span> 加载中...</div>';

  try {
    if (tab === 'skills') await loadSkills(panel);
    else if (tab === 'memory') await loadMemory(panel);
    else if (tab === 'rag') await loadRAG(panel);
    else if (tab === 'graphrag') await loadGraphRAG(panel);
    else if (tab === 'database') await loadDatabase(panel);
  } catch (e) {
    panel.innerHTML = `<div class="card"><h3>错误</h3><p style="color:var(--red)">${e.message}</p></div>`;
  }
}

// Skills panel
async function loadSkills(panel) {
  const [toolRes, knowledgeRes] = await Promise.all([
    fetch('/api/skills'),
    fetch('/api/skills/knowledge'),
  ]);
  const toolData = await toolRes.json();
  const knowledgeData = await knowledgeRes.json();

  let html = '';

  // Knowledge Skills
  html += `<div class="card"><h3>知识型技能 <span class="badge green">${knowledgeData.count} 个文件 / ${knowledgeData.vector_count} 条向量</span></h3>`;
  html += '<div class="action-bar"><button class="action-btn" onclick="rebuildKnowledgeSkills()">重建索引</button><button class="action-btn" onclick="loadPanel(\'skills\')">刷新</button></div>';
  html += '<div class="upload-zone" onclick="document.getElementById(\'skillFileInput\').click()">点击上传技能文件 (.md)<input type="file" id="skillFileInput" accept=".md" onchange="uploadSkillFile(this)" multiple></div>';
  knowledgeData.files.forEach(f => {
    const size = f.size < 1024 ? f.size + ' B' : (f.size / 1024).toFixed(1) + ' KB';
    html += `<div class="file-item"><div><div class="file-name">${escapeHtml(f.name)}</div><div class="file-size">${escapeHtml(f.title)} | ${size}</div></div><button class="file-del" onclick="deleteSkillFile('${f.name}')">删除</button></div>`;
  });
  if (knowledgeData.files.length === 0) html += '<p style="color:var(--text2);font-size:13px">暂无技能文件，请上传 .md 格式的操作指南/SOP</p>';
  html += '</div>';

  // Tool Skills
  html += `<div class="card"><h3>工具型技能 <span class="badge green">${toolData.count}</span></h3>`;
  toolData.skills.forEach(s => {
    html += `<div class="skill-item"><div class="skill-name">${escapeHtml(s.name)}</div><div class="skill-desc">${escapeHtml(s.description)}</div></div>`;
  });
  html += '</div>';

  panel.innerHTML = html;
}

async function uploadSkillFile(input) {
  for (const file of input.files) {
    const formData = new FormData();
    formData.append('file', file);
    await fetch('/api/skills/knowledge/upload', { method: 'POST', body: formData });
  }
  input.value = '';
  loadPanel('skills');
}

async function deleteSkillFile(name) {
  await fetch(`/api/skills/knowledge/${encodeURIComponent(name)}`, { method: 'DELETE' });
  loadPanel('skills');
}

async function rebuildKnowledgeSkills() {
  const panel = document.getElementById('panelContent');
  panel.innerHTML = '<div class="loading"><span class="dot-pulse"></span> 正在重建技能知识索引...</div>';
  try {
    await fetch('/api/skills/knowledge/rebuild', { method: 'POST' });
    loadPanel('skills');
  } catch (e) {
    panel.innerHTML = `<div class="card"><h3>错误</h3><p style="color:var(--red)">${e.message}</p></div>`;
  }
}

// Memory panel
async function loadMemory(panel) {
  const res = await fetch('/api/memory');
  const data = await res.json();
  let html = `<div class="action-bar"><button class="action-btn danger" onclick="clearMemory()">清空记忆</button><button class="action-btn" onclick="loadPanel('memory')">刷新</button></div>`;
  html += `<div class="card"><h3>对话记忆 <span class="badge green">${data.count || 0} 条</span></h3>`;
  if (data.chat_history && data.chat_history.length > 0) {
    data.chat_history.forEach(m => {
      const roleClass = m.role === 'user' ? 'user' : 'assistant';
      const roleLabel = m.role === 'user' ? 'USER' : m.role.toUpperCase();
      const content = typeof m.content === 'string' ? m.content : JSON.stringify(m.content);
      const truncated = content.length > 200 ? content.slice(0, 200) + '...' : content;
      html += `<div class="mem-item"><div class="mem-role ${roleClass}">${roleLabel}</div><div>${escapeHtml(truncated)}</div></div>`;
    });
  } else {
    html += '<p style="color:var(--text2);font-size:13px">暂无对话记忆</p>';
  }
  html += '</div>';
  panel.innerHTML = html;
}

async function clearMemory() {
  await fetch('/api/memory', { method: 'DELETE' });
  loadPanel('memory');
}

// RAG panel
async function loadRAG(panel) {
  const res = await fetch('/api/rag/documents');
  const data = await res.json();
  let html = `<div class="action-bar"><button class="action-btn" onclick="rebuildRAG()">重建索引</button><button class="action-btn" onclick="loadPanel('rag')">刷新</button></div>`;

  html += `<div class="card"><h3>向量索引 <span class="badge green">${data.vector_count} 条向量</span></h3></div>`;

  html += '<div class="card"><h3>上传文档</h3>';
  html += '<div class="upload-zone" onclick="document.getElementById(\'fileInput\').click()">点击选择文件 (PDF/TXT/MD/DOCX)<input type="file" id="fileInput" onchange="uploadFile(this)" multiple></div>';
  html += '</div>';

  html += `<div class="card"><h3>知识库文档 <span class="badge green">${data.documents.length} 个文件</span></h3>`;
  data.documents.forEach(f => {
    const size = f.size < 1024 ? f.size + ' B' : (f.size / 1024).toFixed(1) + ' KB';
    html += `<div class="file-item"><div><div class="file-name">${f.name}</div><div class="file-size">${size}</div></div><button class="file-del" onclick="deleteDoc('${f.name}')">删除</button></div>`;
  });
  if (data.documents.length === 0) html += '<p style="color:var(--text2);font-size:13px">暂无文档</p>';
  html += '</div>';
  panel.innerHTML = html;
}

async function uploadFile(input) {
  for (const file of input.files) {
    const formData = new FormData();
    formData.append('file', file);
    await fetch('/api/rag/upload', { method: 'POST', body: formData });
  }
  input.value = '';
  loadPanel('rag');
}

async function deleteDoc(name) {
  await fetch(`/api/rag/documents/${encodeURIComponent(name)}`, { method: 'DELETE' });
  loadPanel('rag');
}

async function rebuildRAG() {
  const panel = document.getElementById('panelContent');
  panel.innerHTML = '<div class="loading"><span class="dot-pulse"></span> 正在重建索引...</div>';
  try {
    const res = await fetch('/api/rag/rebuild', { method: 'POST' });
    const data = await res.json();
    loadPanel('rag');
  } catch (e) {
    panel.innerHTML = `<div class="card"><h3>错误</h3><p style="color:var(--red)">${e.message}</p></div>`;
  }
}

// GraphRAG panel
async function loadGraphRAG(panel) {
  const res = await fetch('/api/graphrag/status');
  const data = await res.json();

  let html = `<div class="action-bar"><button class="action-btn" onclick="rebuildGraphRAG()">重建图谱</button><button class="action-btn" onclick="loadPanel('graphrag')">刷新</button></div>`;

  if (data.status === 'not_loaded') {
    html += '<div class="card"><h3>知识图谱 <span class="badge orange">未加载</span></h3><p style="color:var(--text2);font-size:13px">点击"重建图谱"从文档构建知识图谱</p></div>';
  } else {
    html += `<div class="card"><h3>知识图谱 <span class="badge green">${data.entity_count} 实体 / ${data.relation_count} 关系</span></h3>`;

    html += '<h3 style="margin-top:12px;font-size:13px">实体</h3><div style="margin:8px 0">';
    data.entities.forEach(e => { html += `<span class="entity-tag">${escapeHtml(e)}</span>`; });
    html += '</div>';

    if (data.relations && data.relations.length > 0) {
      html += '<h3 style="margin-top:12px;font-size:13px">关系</h3>';
      data.relations.slice(0, 30).forEach(r => {
        html += `<div class="relation-item"><span>${escapeHtml(r.subject)}</span> → ${escapeHtml(r.relation)} → <span>${escapeHtml(r.object)}</span></div>`;
      });
      if (data.relations.length > 30) html += `<p style="color:var(--text2);font-size:12px;margin-top:8px">... 共 ${data.relation_count} 条关系</p>`;
    }
    html += '</div>';
  }
  panel.innerHTML = html;
}

async function rebuildGraphRAG() {
  const panel = document.getElementById('panelContent');
  panel.innerHTML = '<div class="loading"><span class="dot-pulse"></span> 正在重建知识图谱 (需要 LLM 抽取实体，可能需要 1-2 分钟)...</div>';
  try {
    await fetch('/api/graphrag/rebuild', { method: 'POST' });
    loadPanel('graphrag');
  } catch (e) {
    panel.innerHTML = `<div class="card"><h3>错误</h3><p style="color:var(--red)">${e.message}</p></div>`;
  }
}

// Database panel
async function loadDatabase(panel) {
  const res = await fetch('/api/database/tables');
  const data = await res.json();

  let html = `<div class="action-bar"><button class="action-btn" onclick="loadPanel('database')">刷新</button></div>`;

  data.tables.forEach(t => {
    html += `<div class="card"><h3>${t.name} <span class="badge green">${t.row_count} 行</span></h3>`;
    html += '<div style="font-size:12px;color:var(--text2);margin-bottom:8px">字段: ' + t.columns.map(c => `${c.name}(${c.type})`).join(', ') + '</div>';
    html += `<button class="action-btn" onclick="loadTableData('${t.name}')">查看数据</button>`;
    html += '</div>';
  });

  html += '<div id="tableDataArea"></div>';
  panel.innerHTML = html;
}

async function loadTableData(table) {
  const res = await fetch(`/api/database/query?table=${table}`);
  const data = await res.json();
  const area = document.getElementById('tableDataArea');

  let html = `<div class="card"><h3>${table} 数据</h3><div style="overflow-x:auto"><table class="data-table"><thead><tr>`;
  data.columns.forEach(c => { html += `<th>${c}</th>`; });
  html += '</tr></thead><tbody>';
  data.data.forEach(row => {
    html += '<tr>';
    data.columns.forEach(c => { html += `<td>${row[c] !== null ? row[c] : '-'}</td>`; });
    html += '</tr>';
  });
  html += '</tbody></table></div></div>';
  area.innerHTML = html;
}

// Chat
async function sendMessage() {
  const input = document.getElementById('chatInput');
  const msg = input.value.trim();
  if (!msg) return;

  input.value = '';
  const btn = document.getElementById('sendBtn');
  btn.disabled = true;

  appendMessage('user', msg);

  const assistantEl = appendMessage('assistant', '', true);

  try {
    const res = await fetch('/api/chat', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ message: msg }),
    });

    const reader = res.body.getReader();
    const decoder = new TextDecoder();
    let fullText = '';

    while (true) {
      const { done, value } = await reader.read();
      if (done) break;

      const text = decoder.decode(value);
      const lines = text.split('\n');
      for (const line of lines) {
        if (line.startsWith('data: ')) {
          try {
            const data = JSON.parse(line.slice(6));
            if (data.type === 'token') {
              fullText += data.content;
              assistantEl.textContent = fullText;
              scrollToBottom();
            } else if (data.type === 'error') {
              assistantEl.textContent = '错误: ' + data.content;
              assistantEl.style.color = 'var(--red)';
            }
          } catch (e) {}
        }
      }
    }

    assistantEl.classList.remove('streaming');

    if (currentTab === 'memory') {
      setTimeout(() => loadPanel('memory'), 500);
    }
  } catch (e) {
    assistantEl.textContent = '网络错误: ' + e.message;
    assistantEl.style.color = 'var(--red)';
    assistantEl.classList.remove('streaming');
  }

  btn.disabled = false;
  input.focus();
}

function appendMessage(role, content, streaming = false) {
  const container = document.getElementById('messages');
  const div = document.createElement('div');
  div.className = `msg ${role}` + (streaming ? ' streaming' : '');
  div.textContent = content;
  container.appendChild(div);
  scrollToBottom();
  return div;
}

function scrollToBottom() {
  const container = document.getElementById('messages');
  container.scrollTop = container.scrollHeight;
}

function escapeHtml(str) {
  const div = document.createElement('div');
  div.textContent = str;
  return div.innerHTML;
}

// Init
loadPanel('skills');
</script>
</body>
</html>
